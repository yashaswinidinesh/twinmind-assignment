<svg xmlns="http://www.w3.org/2000/svg" width="680" height="620" viewBox="0 0 680 620" role="img" aria-labelledby="diag-title diag-desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
<title id="diag-title">TwinMind live suggestions data flow</title>
<desc id="diag-desc">Audio chunks flow from mic to Whisper to transcript. Transcript plus rolling memory plus anti-repeat previews feed GPT-OSS 120B which emits three suggestions and updates memory. Clicked suggestions use the full transcript; typed questions use a windowed transcript.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Row 1: Mic -> Whisper -> Transcript -->
<rect x="40" y="30" width="140" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="110" y="54" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Mic (MediaRecorder)</text>
<text x="110" y="72" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">30s webm chunks</text>
<line x1="180" y1="58" x2="218" y2="58" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="220" y="30" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="300" y="54" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Whisper Large V3</text>
<text x="300" y="72" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Transcribe audio</text>
<line x1="380" y1="58" x2="418" y2="58" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="420" y="30" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="490" y="54" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Transcript</text>
<text x="490" y="72" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Left column appends</text>

<!-- Arrow down from transcript to context builder -->
<line x1="490" y1="86" x2="490" y2="128" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Context builder (middle row, wider) -->
<rect x="160" y="130" width="420" height="86" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="370" y="152" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Live suggestion context (small for speed)</text>
<text x="370" y="172" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Last 6 chunks (≈3 min)  ·  meeting memory</text>
<text x="370" y="190" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Last 2 batch previews (anti-repeat)</text>
<text x="370" y="206" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Input tokens drive TTFT</text>

<!-- Arrow from context builder down to model -->
<line x1="370" y1="216" x2="370" y2="258" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- GPT-OSS 120B -->
<rect x="200" y="260" width="340" height="70" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="370" y="282" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">GPT-OSS 120B · strict JSON schema</text>
<text x="370" y="302" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Updated memory + exactly 3 suggestions</text>
<text x="370" y="318" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">json_object retry if needed</text>

<!-- Memory loop back up to context -->
<path d="M 210 295 L 100 295 L 100 173 L 158 173" stroke="#7F77DD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="60" y="228" text-anchor="middle" font-size="12" fill="#534AB7">Memory</text>
<text x="60" y="242" text-anchor="middle" font-size="12" fill="#534AB7">loops back</text>

<!-- Suggestions emerge right -->
<line x1="540" y1="295" x2="588" y2="295" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="590" y="270" width="70" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="625" y="292" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">3 cards</text>
<text x="625" y="308" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Middle col</text>

<!-- User action -->
<line x1="370" y1="330" x2="370" y2="378" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="250" y="380" width="240" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="370" y="403" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">User action (right column)</text>

<!-- Left branch: click suggestion -->
<path d="M 310 426 L 310 456 L 180 456 L 180 488" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<rect x="70" y="490" width="220" height="70" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="180" y="512" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Click a suggestion</text>
<text x="180" y="532" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Full transcript + detailQuery</text>
<text x="180" y="548" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Streamed answer</text>

<!-- Right branch: free-form -->
<path d="M 430 426 L 430 456 L 560 456 L 560 488" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<rect x="460" y="490" width="200" height="70" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="560" y="512" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Type a question</text>
<text x="560" y="532" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Windowed transcript</text>
<text x="560" y="548" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Streamed answer</text>
</svg>
